<!DOCTYPE html>
<html>
<head>
  <title>Fire AI Debugger</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; }
    #grid { display: grid; margin-top: 10px; }
    .cell { width: 12px; height: 12px; border: 1px solid #222; }
    button { margin: 4px; padding: 6px; }
    .unit-F { color: #00ff88; }
    .unit-T { color: #00aaff; }
    .unit-D { color: #ff00ff; }
  </style>
</head>
<body>

<h2>🔥 Firefighting AI Debugger</h2>

<button onclick="toggleRun()">Start / Pause</button>
<button onclick="toggleInfluence()">Influence</button>
<button onclick="toggleThreat()">Threat</button>
<button onclick="addFire()">Add Fire</button>
<span id="status" style="margin-left: 20px; color: #888;">Connected to Flask API</span>

<div id="grid"></div>

<script>
const SIZE = 40;
const API_URL = 'http://localhost:5000/api';
const grid = document.getElementById("grid");
grid.style.gridTemplateColumns = `repeat(${SIZE}, 12px)`;

// --- State ---
let fires = [];
let units = [];
let running = false;
let showInfluence = true;
let showThreat = true;

const criticalPoints = [{x:20,y:20}];

// --- Helpers ---
const rand = (a,b)=>Math.floor(Math.random()*(b-a))+a;
const dist = (a,b)=>Math.abs(a.x-b.x)+Math.abs(a.y-b.y);

// --- API Functions ---
async function fetchState() {
  try {
    const res = await fetch(`${API_URL}/state`);
    const data = await res.json();
    fires = data.fires;
    units = data.units;
    draw();
  } catch(e) {
    document.getElementById('status').textContent = '⚠️ Flask not connected';
    document.getElementById('status').style.color = 'orange';
  }
}

async function stepSimulation() {
  try {
    const res = await fetch(`${API_URL}/step`, {method: 'POST'});
    const data = await res.json();
    fires = data.fires;
    units = data.units;
    draw();
  } catch(e) {
    console.error('Step error:', e);
  }
}

async function addFireAPI() {
  try {
    await fetch(`${API_URL}/add_fire`, {method: 'POST'});
    fetchState();
  } catch(e) {
    console.error('Add fire error:', e);
  }
}

// --- Entities ---
class Fire {
  constructor(x,y,i){this.x=x;this.y=y;this.intensity=i;}
}

class Unit {
  constructor(name,x,y,dmg,sight){
    this.name=name;
    this.x=x; this.y=y;
    this.dmg=dmg;
    this.sight=sight;
    this.target=null;
  }

  choose(fires){
    return fires.reduce((a,b)=>dist(this,a)<dist(this,b)?a:b);
  }

  computeWeights(fires){
    let w={};
    for(let f of fires){
      let cluster=0;
      for(let o of fires){
        let d=dist(f,o);
        if(d<=3) cluster+=o.intensity/(d+1);
      }
      let threat=Math.min(...criticalPoints.map(p=>dist(f,p)));
      let score=cluster-threat*0.5;
      w[`${f.x},${f.y}`]=Math.max(0.1,1-score*0.001);
    }
    return w;
  }

  step(fires){
    if(!fires.length) return;

    if(!this.target || this.target.intensity<=0){
      this.target=this.choose(fires);
    }

    // Extinguish from 2 blocks away (not within sight range)
    if(dist(this,this.target)<=2){
      this.target.intensity-=this.dmg;
    } else {
      // simple movement (replace with A*)
      if(this.target.x>this.x) this.x++;
      else if(this.target.x<this.x) this.x--;

      if(this.target.y>this.y) this.y++;
      else if(this.target.y<this.y) this.y--;
    }
  }
}

// --- Init ---
async function init(){
  await fetchState();
}

// --- Controls ---
function toggleRun(){ running=!running; }
function toggleInfluence(){ showInfluence=!showInfluence; draw(); }
function toggleThreat(){ showThreat=!showThreat; draw(); }

function addFire(){
  addFireAPI();
}

// --- Simulation loop ---
function loop(){
  if(running){
    stepSimulation();
  }
  // Note: draw() is called in fetchState/stepSimulation
  setTimeout(loop, 200); // 5 steps per second
}

// --- Draw ---
function draw(){
  grid.innerHTML="";

  let weights = units[0]?.computeWeights?.(fires) || {};

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){

      let cell = document.createElement("div");
      cell.className="cell";

      let fire = fires.find(f=>f.x===x && f.y===y);
      let unit = units.find(u=>u.x===x && u.y===y);

      let bg="#111";

      if(showInfluence){
        let w = weights[`${x},${y}`];
        if(w) bg = `rgba(255,165,0,${1-w})`;
      }

      if(fire) bg="red";
      
      // Different colors for different units
      if(unit){
        if(unit.name === 'FireFighter' || unit.name === 'F') bg="#00ff88"; // Green
        else if(unit.name === 'Truck' || unit.name === 'T') bg="#00aaff"; // Blue
        else if(unit.name === 'Drone' || unit.name === 'D') bg="#ff00ff"; // Magenta
        else bg="cyan";
      }

      if(showThreat && criticalPoints.some(p=>p.x===x && p.y===y)){
        bg="purple";
      }

      cell.style.background = bg;
      grid.appendChild(cell);
    }
  }
}

// --- Start ---
init();
loop();

</script>
</body>
</html>
